<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Activities Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f7ff; color: #1a1a2e; min-height: 100vh; }

    /* ── Header ── */
    header { background: linear-gradient(135deg, #6366f1, #06b6d4); color: white; padding: 24px 20px 18px; text-align: center; }
    header h1 { font-size: 2rem; font-weight: 800; }
    header p { margin-top: 4px; font-size: 0.9rem; opacity: 0.85; }
    .family-badges { margin-top: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .family-badge { background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; }
    .header-btns { margin-top: 12px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .hbtn { background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.5); color: white; border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .hbtn:hover { background: rgba(255,255,255,0.35); }
    #authStatus { margin-top: 6px; font-size: 0.72rem; opacity: 0.75; }

    /* ── City Selector ── */
    .city-bar { background: white; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: center; gap: 0; overflow-x: auto; }
    .city-btn { padding: 12px 24px; font-size: 0.88rem; font-weight: 700; border: none; background: none; cursor: pointer; color: #94a3b8; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.2s; }
    .city-btn.active { color: #6366f1; border-bottom-color: #6366f1; }
    .city-btn:hover:not(.active) { color: #475569; }

    /* ── Month Selector ── */
    .month-bar { max-width: 1100px; margin: 16px auto 0; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-arrow { background: white; border: 2px solid #e2e8f0; border-radius: 8px; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .month-arrow:hover { border-color: #6366f1; color: #6366f1; }
    .month-label { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; min-width: 150px; text-align: center; }
    .month-today-btn { padding: 7px 14px; background: #eef2ff; color: #6366f1; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .month-today-btn:hover { background: #e0e7ff; }

    /* ── Dashboard ── */
    .dashboard { max-width: 1100px; margin: 12px auto 0; padding: 0 16px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    @media (max-width: 700px) { .dashboard { grid-template-columns: repeat(3, 1fr); } }
    .dash-card { background: white; border-radius: 10px; padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; }
    .dash-label { font-size: 0.62rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
    .dash-value { font-size: 1.1rem; font-weight: 800; color: #6366f1; margin-top: 3px; line-height: 1; }
    .dash-sub { font-size: 0.62rem; color: #aaa; margin-top: 3px; }

    /* ── View Tabs ── */
    .view-tabs { max-width: 1100px; margin: 20px auto 0; padding: 0 16px; display: flex; border-bottom: 2px solid #e2e8f0; }
    .tab-btn { padding: 10px 22px; font-size: 0.9rem; font-weight: 700; border: none; background: none; cursor: pointer; color: #94a3b8; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; }
    .tab-btn:hover:not(.active) { color: #475569; }

    /* ── Plan View ── */
    #planView { max-width: 1100px; margin: 0 auto; padding: 16px 16px 40px; }
    .weeks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .week-col { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; display: flex; flex-direction: column; }
    .week-header { background: linear-gradient(135deg, #6366f1, #06b6d4); color: white; font-size: 0.8rem; font-weight: 700; padding: 10px 14px; letter-spacing: 0.5px; }
    .week-activities { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .plan-card { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px; position: relative; transition: border-color 0.2s; }
    .plan-card:hover { border-color: #6366f1; }
    .plan-card-top { display: flex; gap: 10px; align-items: flex-start; }
    .plan-card-emoji { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
    .plan-card-info { flex: 1; }
    .plan-card-name { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
    .plan-card-loc { font-size: 0.72rem; color: #888; margin-top: 2px; }
    .plan-card-price { font-size: 0.78rem; font-weight: 600; color: #6366f1; margin-top: 6px; }
    .remove-btn { position: absolute; top: 8px; right: 8px; background: #fee2e2; border: none; color: #dc2626; width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .remove-btn:hover { background: #fecaca; }
    .plan-card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .plan-map-btn { padding: 5px 10px; background: #ff6b6b; color: white; border: none; border-radius: 6px; font-size: 0.72rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .plan-map-btn:hover { background: #e05555; }
    .week-empty { text-align: center; padding: 20px 10px; color: #bbb; font-size: 0.82rem; }
    .add-activity-btn { margin: 0 10px 10px; padding: 9px; border: 2px dashed #c7d2fe; border-radius: 10px; background: none; color: #6366f1; font-size: 0.82rem; font-weight: 600; cursor: pointer; width: calc(100% - 20px); transition: all 0.2s; }
    .add-activity-btn:hover { background: #eef2ff; border-color: #6366f1; }

    /* ── All Activities View ── */
    #allView { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; padding: 16px 0 0; }
    .search-wrap { flex: 1; min-width: 200px; }
    .search-wrap input { width: 100%; padding: 10px 16px; border: 2px solid #dde; border-radius: 10px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: #6366f1; }
    .filter-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn { padding: 8px 16px; border: 2px solid #dde; border-radius: 20px; background: white; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: #6366f1; color: #6366f1; }
    .filter-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
    .results-count { font-size: 0.85rem; color: #666; padding: 10px 0 0; }
    .grid { margin-top: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
    .card-header { padding: 20px 20px 0; display: flex; align-items: flex-start; gap: 14px; }
    .card-emoji { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }
    .card-title-wrap { flex: 1; }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .card-location { font-size: 0.78rem; color: #888; margin-top: 3px; }
    .tags { padding: 10px 20px 0; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 3px 10px; border-radius: 12px; font-size: 0.73rem; font-weight: 600; }
    .tag-category { background: #eef2ff; color: #4f46e5; }
    .tag-age { background: #f0fdf4; color: #15803d; }
    .tag-family { background: #fdf4ff; color: #9333ea; }
    .budget-tag { padding: 3px 10px; border-radius: 12px; font-size: 0.73rem; font-weight: 700; }
    .budget-free { background: #dcfce7; color: #16a34a; }
    .budget-low  { background: #fef9c3; color: #a16207; }
    .budget-mid  { background: #ffedd5; color: #c2410c; }
    .budget-high { background: #fee2e2; color: #dc2626; }
    .card-desc { padding: 10px 20px; font-size: 0.85rem; color: #555; line-height: 1.6; flex: 1; }
    .card-footer { padding: 12px 20px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f0f0f0; gap: 10px; }
    .price-range { font-size: 0.85rem; font-weight: 600; color: #333; }
    .price-range span { display: block; font-size: 0.73rem; color: #888; font-weight: 400; }
    .card-btns { display: flex; gap: 8px; }
    .map-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; background: #ff6b6b; color: white; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: background 0.2s; white-space: nowrap; border: none; cursor: pointer; }
    .map-btn:hover { background: #e05555; }
    .add-to-plan-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; background: #6366f1; color: white; border-radius: 8px; font-size: 0.8rem; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .add-to-plan-btn:hover { background: #4f46e5; }
    .no-results { text-align: center; padding: 60px 20px; color: #999; font-size: 1rem; grid-column: 1/-1; }

    /* ── Modals ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 20px; width: 100%; max-width: 540px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; }
    .modal-body { overflow-y: auto; padding: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
    .week-pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .week-pick-btn { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: #6366f1; transition: all 0.2s; text-align: center; }
    .week-pick-btn:hover { background: #eef2ff; border-color: #6366f1; }
    .modal-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: background 0.15s; border: 2px solid transparent; }
    .modal-item:hover { background: #f5f3ff; border-color: #6366f1; }
    .modal-item-emoji { font-size: 1.6rem; flex-shrink: 0; }
    .modal-item-info { flex: 1; }
    .modal-item-name { font-size: 0.88rem; font-weight: 700; }
    .modal-item-meta { font-size: 0.73rem; color: #888; margin-top: 2px; }
    .modal-item-price { font-size: 0.78rem; font-weight: 600; color: #6366f1; white-space: nowrap; flex-shrink: 0; }

    /* ── Family Setup ── */
    .setup-intro { font-size: 0.88rem; color: #555; line-height: 1.6; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: #444; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .form-input:focus { border-color: #6366f1; }
    .kids-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
    .kid-row { display: flex; gap: 8px; align-items: center; }
    .kid-row .form-input { flex: 1; }
    .kid-row .age-input { width: 90px; flex-shrink: 0; }
    .remove-kid-btn { background: #fee2e2; border: none; color: #dc2626; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 700; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .add-kid-btn { padding: 8px 14px; border: 2px dashed #c7d2fe; border-radius: 10px; background: none; color: #6366f1; font-size: 0.82rem; font-weight: 600; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
    .add-kid-btn:hover { background: #eef2ff; }
    .save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .save-btn:hover { background: #4f46e5; }

    footer { text-align: center; padding: 20px; font-size: 0.78rem; color: #aaa; }

    @media (max-width: 500px) {
      header h1 { font-size: 1.5rem; }
      .weeks-grid { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .week-pick-grid { grid-template-columns: 1fr; }
      .month-bar { flex-direction: column; gap: 10px; align-items: stretch; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <h1>🎉 Kids Activities Planner</h1>
  <p id="headerSub">Find fun things to do with your family!</p>
  <div class="family-badges" id="familyBadges"></div>
  <div class="header-btns">
    <button class="hbtn" onclick="openSetup()">✏️ Edit Family</button>
    <button class="hbtn" id="loginBtn" onclick="signIn()" style="display:none;">🔑 Sign In to Sync</button>
    <button class="hbtn" id="logoutBtn" onclick="signOut()" style="display:none;">👋 Sign Out</button>
  </div>
  <div id="authStatus"></div>
</header>

<!-- City Selector -->
<div class="city-bar" id="cityBar"></div>

<!-- Month Selector + Dashboard -->
<div class="month-bar">
  <div class="month-nav">
    <button class="month-arrow" onclick="changeMonth(-1)">←</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-arrow" onclick="changeMonth(1)">→</button>
  </div>
  <button class="month-today-btn" onclick="goToToday()">Today's Month</button>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- View Tabs -->
<div class="view-tabs">
  <button class="tab-btn active" id="tabPlan" onclick="switchTab('plan')">📅 This Month's Plan</button>
  <button class="tab-btn" id="tabAll" onclick="switchTab('all')">🗺️ All Activities</button>
</div>

<!-- Plan View -->
<div id="planView">
  <div class="weeks-grid" id="weeksGrid"></div>
</div>

<!-- All Activities View -->
<div id="allView" style="display:none;">
  <div class="controls">
    <div class="search-wrap"><input type="text" id="searchInput" placeholder="🔍 Search activities..." oninput="renderList()" /></div>
    <div class="filter-group" id="categoryFilters"></div>
    <div class="filter-group" id="budgetFilters"></div>
  </div>
  <div class="results-count" id="resultsCount"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Family Setup Modal -->
<div class="modal-overlay" id="setupModal">
  <div class="modal">
    <div class="modal-header">
      <h3>👨‍👩‍👧‍👦 Set Up Your Family</h3>
      <button class="modal-close" onclick="closeModal('setupModal')">✕</button>
    </div>
    <div class="modal-body">
      <p class="setup-intro">Tell us about your family so we can personalise activity suggestions!</p>
      <div class="form-group">
        <label class="form-label">Family Name</label>
        <input class="form-input" id="familyNameInput" placeholder="e.g. The Smiths" />
      </div>
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" id="parentNameInput" placeholder="e.g. Justin" />
      </div>
      <div class="form-group">
        <label class="form-label">Spouse / Partner <span style="font-weight:400;color:#aaa">(optional)</span></label>
        <input class="form-input" id="spouseNameInput" placeholder="e.g. Sarah" />
      </div>
      <div class="form-group">
        <label class="form-label">Kids</label>
        <div class="kids-list" id="kidsList"></div>
        <button class="add-kid-btn" onclick="addKidRow()">+ Add another child</button>
      </div>
      <div id="setupError" style="color:#dc2626;font-size:0.82rem;margin-top:8px;display:none;"></div>
    </div>
    <div class="modal-footer">
      <button class="save-btn" onclick="saveFamily()">Save & Continue 🎉</button>
    </div>
  </div>
</div>

<!-- Week Picker Modal -->
<div class="modal-overlay" id="weekPickModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📅 Add to which week?</h3>
      <button class="modal-close" onclick="closeModal('weekPickModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="week-pick-grid" id="weekPickGrid"></div>
    </div>
  </div>
</div>

<!-- Activity Picker Modal -->
<div class="modal-overlay" id="activityPickModal">
  <div class="modal">
    <div class="modal-header">
      <h3>➕ Choose an Activity</h3>
      <button class="modal-close" onclick="closeModal('activityPickModal')">✕</button>
    </div>
    <div class="modal-body" id="activityPickList"></div>
  </div>
</div>

<footer>Prices are approximate. Always check official websites for the latest info. 🌏</footer>

<script>
// ── FIREBASE ──────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyA5dYU6D2eZBFoQG9-4NHfSKWXwsI05LNo",
  authDomain: "bangkok-kids-activities.firebaseapp.com",
  projectId: "bangkok-kids-activities",
  storageBucket: "bangkok-kids-activities.firebasestorage.app",
  messagingSenderId: "757324517545",
  appId: "1:757324517545:web:243a2d44c8fd5ba0d459b8"
});
const auth = firebase.auth();
const db   = firebase.firestore();

function signIn()  { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signOut() { auth.signOut(); }

async function saveToFirestore() {
  const user = auth.currentUser;
  if (!user) return;
  await db.collection('users').doc(user.uid).set({ family: state.family, plans: state.plans });
}

auth.onAuthStateChanged(async user => {
  document.getElementById('loginBtn').style.display  = user ? 'none' : 'inline-block';
  document.getElementById('logoutBtn').style.display = user ? 'inline-block' : 'none';
  document.getElementById('authStatus').textContent  = user ? `Signed in as ${user.email}` : 'Sign in to sync across devices';

  if (user) {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      const d = doc.data();
      if (d.family) state.family = d.family;
      if (d.plans)  state.plans  = d.plans;
    }
  } else {
    const saved = loadLocal();
    if (saved.family) state.family = saved.family;
    if (saved.plans)  state.plans  = saved.plans;
  }
  renderAll();
  if (!state.family.name) setTimeout(() => openSetup(), 300);
});

// ── LOCAL STORAGE ─────────────────────────────
const _store = (() => {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return localStorage; }
  catch { const m={}; return { getItem: k=>m[k]||null, setItem:(k,v)=>{m[k]=v;} }; }
})();

function loadLocal() {
  try { return { family: JSON.parse(_store.getItem('bkk_family')||'null'), plans: JSON.parse(_store.getItem('bkk_plans')||'null') }; }
  catch { return {}; }
}
function saveLocal() {
  try { _store.setItem('bkk_family', JSON.stringify(state.family)); _store.setItem('bkk_plans', JSON.stringify(state.plans)); }
  catch {}
}
function saveState() { saveLocal(); saveToFirestore(); }

// ── CITIES & ACTIVITIES ───────────────────────
const CITIES = {
  'Bangkok': {
    flag: '🇹🇭', currency: '฿',
    activities: [
      { name:"KidZania Bangkok", emoji:"🏙️", location:"Siam Paragon", category:"Indoor", ageRange:"3–14 yrs", minAge:3, budget:"high", priceRange:"฿800–฿1,000 / child", budgetMin:1600, budgetMax:2000, description:"A mini city where kids role-play as doctors, pilots, and firefighters. Highly interactive and educational.", mapUrl:"https://maps.google.com/?q=KidZania+Bangkok+Siam+Paragon" },

const CITY_NAMES = Object.keys(CITIES);

// ── STATE ──────────────────────────────────────
const _now = new Date();
const _initMonth = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;

const state = {
  family: { name:'', parent:'', spouse:'', kids:[] },
  selectedCity: 'Bangkok',
  selectedMonth: _initMonth,
  plans: {}
};

function planKey() { return `${state.selectedCity}__${state.selectedMonth}`; }
function currentPlan() { return state.plans[planKey()] || {0:[],1:[],2:[],3:[]}; }
function setPlan(p) { state.plans[planKey()] = p; }
function getWeek(w) { return currentPlan()[w] || []; }
function setWeek(w, arr) { const p = currentPlan(); p[w] = arr; setPlan(p); }

function cityActivities() { return CITIES[state.selectedCity].activities; }
function activityByName(name) { return cityActivities().find(a => a.name === name); }

function minFamilyAge() {
  if (!state.family.kids.length) return 99;
  return Math.min(...state.family.kids.map(k => parseFloat(k.age)||0));
}
function isFamilyFriendly(a) { return a.minAge <= minFamilyAge(); }

// ── MONTH HELPERS ──────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function changeMonth(delta) {
  const [y, m] = state.selectedMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.selectedMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  renderMonthLabel();
  renderDashboard();
  renderPlanner();
}

function goToToday() {
  const n = new Date();
  state.selectedMonth = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  renderMonthLabel();
  renderDashboard();
  renderPlanner();
}

function renderMonthLabel() {
  const [y, m] = state.selectedMonth.split('-').map(Number);
  document.getElementById('monthLabel').textContent = `${MONTH_NAMES[m-1]} ${y}`;
}

// ── HEADER ─────────────────────────────────────
function renderHeader() {
  const { family } = state;
  document.getElementById('headerSub').textContent = family.name ? `Personalised for ${family.name}` : 'Find fun things to do with your family!';
  const badges = document.getElementById('familyBadges');
  if (family.name) {
    const people = [family.parent, family.spouse].filter(Boolean).map(n => `<span class="family-badge">👤 ${n}</span>`).join('');
    const kids = family.kids.map(k => `<span class="family-badge">${k.age<2?'👶':'🧒'} ${k.name} (${k.age} yr${k.age!=1?'s':''})</span>`).join('');
    badges.innerHTML = people + kids + '<span class="family-badge">📍 Asia</span>';
  } else { badges.innerHTML = ''; }
}

// ── CITY BAR ───────────────────────────────────
function renderCityBar() {
  const bar = document.getElementById('cityBar');
  bar.innerHTML = CITY_NAMES.map(c =>
    `<button class="city-btn${c===state.selectedCity?' active':''}" data-city="${c}">${CITIES[c].flag} ${c}</button>`
  ).join('');
  bar.onclick = e => {
    const btn = e.target.closest('[data-city]');
    if (!btn) return;
    state.selectedCity = btn.dataset.city;
    renderCityBar();
    renderMonthLabel();
    renderDashboard();
    renderPlanner();
    buildFilters();
    renderList();
  };
}

// ── DASHBOARD ──────────────────────────────────
function renderDashboard() {
  const plan = currentPlan();
  const all  = Object.values(plan).flat().map(n => activityByName(n)).filter(Boolean);
  const min  = all.reduce((s,a)=>s+a.budgetMin,0);
  const max  = all.reduce((s,a)=>s+a.budgetMax,0);
  const free = all.filter(a=>a.budget==='free').length;
  const cur  = CITIES[state.selectedCity].currency;
  document.getElementById('dashboard').innerHTML = `
    <div class="dash-card"><div class="dash-label">Activities</div><div class="dash-value">${all.length}</div><div class="dash-sub">this month</div></div>
    <div class="dash-card"><div class="dash-label">Budget Min</div><div class="dash-value">${cur}${min.toLocaleString()}</div><div class="dash-sub">best case</div></div>
    <div class="dash-card"><div class="dash-label">Budget Max</div><div class="dash-value">${cur}${max.toLocaleString()}</div><div class="dash-sub">worst case</div></div>
    <div class="dash-card"><div class="dash-label">Free</div><div class="dash-value">${free}</div><div class="dash-sub">activities</div></div>
    <div class="dash-card"><div class="dash-label">Avg / Outing</div><div class="dash-value">${all.length?cur+Math.round((min+max)/2/all.length).toLocaleString():'—'}</div><div class="dash-sub">estimated</div></div>`;
}

// ── TAB TOGGLE ─────────────────────────────────
function switchTab(tab) {
  document.getElementById('planView').style.display = tab==='plan'?'':'none';
  document.getElementById('allView').style.display  = tab==='all'?'':'none';
  document.getElementById('tabPlan').classList.toggle('active', tab==='plan');
  document.getElementById('tabAll').classList.toggle('active',  tab==='all');
}

// ── PLANNER ────────────────────────────────────
const WEEK_LABELS = ['Week 1','Week 2','Week 3','Week 4'];

function renderPlanner() {
  const grid = document.getElementById('weeksGrid');
  grid.innerHTML = '';
  [0,1,2,3].forEach(w => {
    const acts = getWeek(w).map(n=>activityByName(n)).filter(Boolean);
    const cardsHtml = acts.length
      ? acts.map((a,slot) => `
          <div class="plan-card">
            <button class="remove-btn" data-week="${w}" data-slot="${slot}">✕</button>
            <div class="plan-card-top">
              <div class="plan-card-emoji">${a.emoji}</div>
              <div class="plan-card-info">
                <div class="plan-card-name">${a.name}</div>
                <div class="plan-card-loc">📍 ${a.location}</div>
                <div class="plan-card-price">${a.priceRange}</div>
              </div>
            </div>
            <div class="plan-card-actions">
              <a class="plan-map-btn" href="${a.mapUrl}" target="_blank" rel="noopener">🗺️ Map</a>
            </div>
          </div>`).join('')
      : '<div class="week-empty">No activities yet<br>tap + to add one</div>';
    grid.innerHTML += `
      <div class="week-col">
        <div class="week-header">${WEEK_LABELS[w]}</div>
        <div class="week-activities">${cardsHtml}</div>
        <button class="add-activity-btn" data-add-week="${w}">+ Add Activity</button>
      </div>`;
  });
}

// Event delegation for planner
document.getElementById('weeksGrid').addEventListener('click', e => {
  const removeBtn = e.target.closest('[data-week][data-slot]');
  if (removeBtn) {
    const w = parseInt(removeBtn.dataset.week), slot = parseInt(removeBtn.dataset.slot);
    const arr = [...getWeek(w)]; arr.splice(slot, 1); setWeek(w, arr);
    saveState(); renderPlanner(); renderDashboard(); return;
  }
  const addBtn = e.target.closest('[data-add-week]');
  if (addBtn) openActivityPicker(parseInt(addBtn.dataset.addWeek));
});

// ── ACTIVITY PICKER ────────────────────────────
let _pickingWeek = null, _pickOptions = [];

function openActivityPicker(weekIndex) {
  _pickingWeek = weekIndex;
  const used = new Set(getWeek(weekIndex));
  _pickOptions = cityActivities().filter(a => !used.has(a.name));
  document.getElementById('activityPickList').innerHTML = _pickOptions.map((a,i) => `
    <div class="modal-item" data-idx="${i}">
      <div class="modal-item-emoji">${a.emoji}</div>
      <div class="modal-item-info">
        <div class="modal-item-name">${a.name} ${isFamilyFriendly(a)?'✅':'⚠️ older kids'}</div>
        <div class="modal-item-meta">📍 ${a.location} · ${a.ageRange}</div>
      </div>
      <div class="modal-item-price">${a.priceRange}</div>
    </div>`).join('');
  document.getElementById('activityPickList').onclick = e => {
    const item = e.target.closest('[data-idx]');
    if (!item) return;
    const a = _pickOptions[parseInt(item.dataset.idx)];
    const arr = [...getWeek(_pickingWeek)];
    if (!arr.includes(a.name)) { arr.push(a.name); setWeek(_pickingWeek, arr); saveState(); renderPlanner(); renderDashboard(); }
    closeModal('activityPickModal');
  };
  openModal('activityPickModal');
}

// ── ADD TO PLAN (from All Activities) ──────────
let _pendingActivity = null, _listFiltered = [];

function openWeekPicker(name) {
  _pendingActivity = name;
  document.getElementById('weekPickGrid').innerHTML = WEEK_LABELS.map((lbl,i) => {
    const cnt = getWeek(i).length;
    return `<button class="week-pick-btn" data-pick-week="${i}">${lbl}<br><span style="font-size:0.75rem;color:#94a3b8;font-weight:400">${cnt} activit${cnt===1?'y':'ies'}</span></button>`;
  }).join('');
  document.getElementById('weekPickGrid').onclick = e => {
    const btn = e.target.closest('[data-pick-week]');
    if (!btn) return;
    const w = parseInt(btn.dataset.pickWeek);
    const arr = [...getWeek(w)];
    if (!arr.includes(_pendingActivity)) { arr.push(_pendingActivity); setWeek(w, arr); saveState(); renderPlanner(); renderDashboard(); }
    closeModal('weekPickModal');
  };
  openModal('weekPickModal');
}

// ── ALL ACTIVITIES LIST ────────────────────────
const BUDGETS = [{key:'all',label:'All Budgets'},{key:'free',label:'Free'},{key:'low',label:'Budget'},{key:'mid',label:'Mid'},{key:'high',label:'Splurge'}];
let _activeCategory='All', _activeBudget='all';

function budgetClass(b){ return {free:'budget-free',low:'budget-low',mid:'budget-mid',high:'budget-high'}[b]; }
function budgetLabel(b){ return {free:'Free',low:'Budget',mid:'Mid',high:'Splurge'}[b]; }

function buildFilters() {
  const cats = ['All',...new Set(cityActivities().map(a=>a.category))];
  const catEl = document.getElementById('categoryFilters');
  catEl.innerHTML='';
  cats.forEach(c => {
    const btn=document.createElement('button'); btn.className='filter-btn'+(c===_activeCategory?' active':''); btn.textContent=c;
    btn.onclick=()=>{ _activeCategory=c; buildFilters(); renderList(); }; catEl.appendChild(btn);
  });
  const budEl=document.getElementById('budgetFilters');
  budEl.innerHTML='';
  BUDGETS.forEach(b => {
    const btn=document.createElement('button'); btn.className='filter-btn'+(b.key===_activeBudget?' active':''); btn.textContent=b.label;
    btn.onclick=()=>{ _activeBudget=b.key; buildFilters(); renderList(); }; budEl.appendChild(btn);
  });
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  _listFiltered = cityActivities().filter(a => {
    const matchCat = _activeCategory==='All'||a.category===_activeCategory;
    const matchBud = _activeBudget==='all'||a.budget===_activeBudget;
    const matchQ   = !q||a.name.toLowerCase().includes(q)||a.description.toLowerCase().includes(q)||a.location.toLowerCase().includes(q);
    return matchCat&&matchBud&&matchQ;
  });
  document.getElementById('resultsCount').textContent=`Showing ${_listFiltered.length} of ${cityActivities().length} activities`;
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!_listFiltered.length){ grid.innerHTML='<div class="no-results">😔 No activities found.</div>'; return; }
  _listFiltered.forEach((a,i)=>{
    const suitable=isFamilyFriendly(a);
    grid.innerHTML+=`
      <div class="card">
        <div class="card-header"><div class="card-emoji">${a.emoji}</div><div class="card-title-wrap"><div class="card-title">${a.name}</div><div class="card-location">📍 ${a.location}</div></div></div>
        <div class="tags">
          <span class="tag tag-category">${a.category}</span>
          <span class="tag tag-age">👶 ${a.ageRange}</span>
          <span class="budget-tag ${budgetClass(a.budget)}">${budgetLabel(a.budget)}</span>
          ${suitable&&state.family.kids.length?'<span class="tag tag-family">✅ Family pick</span>':''}
        </div>
        <div class="card-desc">${a.description}</div>
        <div class="card-footer">
          <div class="price-range">${a.priceRange}<span>Approx. entry</span></div>
          <div class="card-btns">
            <button class="add-to-plan-btn" data-list-idx="${i}">+ Plan</button>
            <a class="map-btn" href="${a.mapUrl}" target="_blank" rel="noopener">🗺️ Map</a>
          </div>
        </div>
      </div>`;
  });
  grid.onclick = e => {
    const btn=e.target.closest('[data-list-idx]');
    if(btn) openWeekPicker(_listFiltered[parseInt(btn.dataset.listIdx)].name);
  };
}

// ── FAMILY SETUP ───────────────────────────────
function openSetup() {
  document.getElementById('familyNameInput').value=state.family.name||'';
  document.getElementById('parentNameInput').value=state.family.parent||'';
  document.getElementById('spouseNameInput').value=state.family.spouse||'';
  document.getElementById('setupError').style.display='none';
  const list=document.getElementById('kidsList'); list.innerHTML='';
  (state.family.kids.length?state.family.kids:[{name:'',age:''}]).forEach(k=>addKidRow(k));
  openModal('setupModal');
}

function addKidRow(kid={name:'',age:''}) {
  const list=document.getElementById('kidsList');
  const div=document.createElement('div'); div.className='kid-row';
  div.innerHTML=`<input class="form-input" placeholder="Child's name" value="${kid.name}" /><input class="form-input age-input" type="number" placeholder="Age (yrs)" min="0" max="18" step="0.5" value="${kid.age}" /><button class="remove-kid-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);
}

function saveFamily() {
  const name=document.getElementById('familyNameInput').value.trim();
  const errEl=document.getElementById('setupError');
  if(!name){errEl.textContent='Please enter your family name.';errEl.style.display='block';return;}
  errEl.style.display='none';
  const parent=document.getElementById('parentNameInput').value.trim();
  const spouse=document.getElementById('spouseNameInput').value.trim();
  const kids=[];
  document.querySelectorAll('#kidsList .kid-row').forEach(row=>{
    const ins=row.querySelectorAll('input');
    const kn=ins[0].value.trim(), ka=parseFloat(ins[1].value);
    if(kn&&!isNaN(ka)) kids.push({name:kn,age:ka});
  });
  state.family={name,parent,spouse,kids};
  saveState(); closeModal('setupModal'); renderAll();
}

// ── MODALS ─────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});
});

// ── RENDER ALL ─────────────────────────────────
function renderAll() {
  renderHeader();
  renderCityBar();
  renderMonthLabel();
  renderDashboard();
  renderPlanner();
  buildFilters();
  renderList();
}

// Startup handled by auth.onAuthStateChanged
</script>
</body>
